name: "mv20240555-app"

services:
  mysql:
    image: mysql:8.0
    container_name: mv20240555-db
    env_file:
      - ./env/mysql.env
    networks:
      app-network:
        aliases:
          - mysql-server
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./db/my.cnf:/etc/mysql/conf.d/my-custom.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "student", "--password=student"]
      interval: 10s
      timeout: 10s
      retries: 6

  backend:
    build: ./backend
    container_name: mv20240555-back
    ports:
      - "3000:3000"
    env_file:
      - ./env/backend.env
    networks:
      - app-network
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: mv20240555-front
    ports:
      - "5000:3000"
    networks:
      - app-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data: