name: "xx22221111-app"

services:
  database:
    image: mysql:latest
    container_name: xx22221111-db
    env_file:
      - ./env/mysql.env
    networks:
      xx22221111-network:
        aliases:
          - mysql-server
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./db/my.cnf:/etc/mysql/conf.d/my-custom.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "student", "--password=student"]
      interval: 10s
      timeout: 10s
      retries: 6

  backend:
    build: ./backend
    image: xx22221111-img1
    container_name: xx22221111-back
    ports:
      - "3000:3000"
    env_file:
      - ./env/backend.env
    networks:
      - xx22221111-network
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build: ./frontend
    image: xx22221111-img2
    container_name: xx22221111-front
    ports:
      - "5000:3000"
    networks:
      - xx22221111-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

networks:
  xx22221111-network:
    name: xx22221111-network
    driver: bridge

volumes:
  mysql-data:
    name: xx22221111-mysql-data
